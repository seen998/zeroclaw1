[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.railway"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"

# Require a persistent volume mounted at /zeroclaw-data (Railway).
# The entrypoint script handles ownership fixup since Railway
# mounts volumes as root.
requiredMountPath = "/zeroclaw-data"
